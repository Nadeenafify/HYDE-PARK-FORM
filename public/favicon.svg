<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 140 140" fill="none">
  <!-- Hyde Park Developments "H" labyrinth monogram -->
  <rect width="140" height="140" rx="22" fill="#ffffff" />
  <g transform="translate(10,10)" stroke="#222a4d" stroke-width="2.6" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- striped legs -->
    <line x1="8" y1="8" x2="8" y2="112" />
    <line x1="14" y1="8" x2="14" y2="112" />
    <line x1="20" y1="8" x2="20" y2="112" />
    <line x1="26" y1="8" x2="26" y2="112" />
    <line x1="32" y1="8" x2="32" y2="112" />
    <line x1="88" y1="8" x2="88" y2="112" />
    <line x1="94" y1="8" x2="94" y2="112" />
    <line x1="100" y1="8" x2="100" y2="112" />
    <line x1="106" y1="8" x2="106" y2="112" />
    <line x1="112" y1="8" x2="112" y2="112" />
    <!-- nested notch brackets -->
    <polyline points="38,48 38,8 82,8 82,48" />
    <polyline points="44,48 44,14 76,14 76,48" />
    <polyline points="50,48 50,20 70,20 70,48" />
    <polyline points="56,48 56,26 64,26 64,48" />
    <polyline points="38,72 38,112 82,112 82,72" />
    <polyline points="44,72 44,106 76,106 76,72" />
    <polyline points="50,72 50,100 70,100 70,72" />
    <polyline points="56,72 56,94 64,94 64,72" />
    <!-- crossbar -->
    <line x1="26" y1="52" x2="94" y2="52" />
    <line x1="26" y1="56" x2="94" y2="56" />
    <line x1="26" y1="60" x2="94" y2="60" />
    <line x1="26" y1="64" x2="94" y2="64" />
    <line x1="26" y1="68" x2="94" y2="68" />
  </g>
</svg>
